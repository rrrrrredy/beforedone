name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "19 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codeql:
    name: CodeQL (Go)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4
        with:
          languages: go
          build-mode: manual
          queries: security-extended

      - name: Build for CodeQL
        run: go build ./...

      - name: Analyze
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4
        with:
          category: /language:go

  secret-scan:
    name: Gitleaks history scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out full history
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: "1.26.x"
          cache: false

      - name: Install pinned Gitleaks CLI
        run: go install github.com/zricethezav/gitleaks/v8@v8.30.1

      - name: Scan all reachable history
        shell: bash
        run: |
          "$(go env GOPATH)/bin/gitleaks" git --redact --no-banner --verbose .
